<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasarela de Pago - C.S.D. Constitución</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .pago-box { background: #1a1d23; padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #fbc02d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #fbc02d; margin-top: 0; }
        .total-display { font-size: 2.5rem; font-weight: bold; margin: 20px 0; }
        .btn-confirmar { background: #fbc02d; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-confirmar:hover { background: #ffd740; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="pago-box">
        <h2>Procesando Pago</h2>
        <div class="total-display" id="montoDisplay">$0</div>
        <button class="btn-confirmar" onclick="confirmarPago()">CONFIRMAR PAGO</button>
    </div>

    <script>
        // Al cargar, recuperamos el monto desde el sessionStorage
        const total = sessionStorage.getItem('totalCompra') || '0';
        document.getElementById('montoDisplay').innerText = '$' + total;

        function confirmarPago() {
            // Recuperamos el tipo de pago para saber qué mensaje mostrar o cómo procesar
            const tipoPago = sessionStorage.getItem('tipoPago') || 'entrada';
            
            // Creamos el objeto con los datos que SoySocio.html espera
            const datosPago = {
                monto: total,
                tipo: tipoPago,
                detalle: "Pago verificado exitosamente"
            };

            // Guardamos el resultado en sessionStorage para que el panel lo detecte al volver
            sessionStorage.setItem('pagoExitoso', JSON.stringify(datosPago));

            // Redirigimos de vuelta al panel del socio
            window.location.href = "SoySocio.html";
        }
    </script>
</body>
</html>
