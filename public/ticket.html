<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets | Club Constitución</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #facc15; --bg: #050505; --card: rgba(20, 20, 20, 0.85); }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .hero-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80'); background-size: cover; z-index: -1; }
        .header-nav { width: 100%; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; }
        .logo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; margin-bottom: 15px; }
        .navbar { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .navbar a { color: white; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        .main-wrapper { width: 100%; max-width: 450px; padding: 0 15px; box-sizing: border-box; display: flex; justify-content: center; }
        .card { background: var(--card); backdrop-filter: blur(20px); padding: 30px; border-radius: 30px; width: 100%; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        h2 { text-align: center; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; font-size: 1.3rem; }
        .qty-box { display: flex; justify-content: space-around; align-items: center; background: #111; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .btn-qty { background: #222; border: none; color: white; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-size: 0.9rem; }
        .btn-pay { background: var(--gold); color: black; }
        .btn-regresar { background: transparent; border: 1px solid #444; color: #888; }
        #ticket-img { background: white; color: black; padding: 20px; border-radius: 20px; text-align: center; border: 2px dashed #ccc; }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <header class="header-nav">
        <img src="logo.jpg" alt="Logo" class="logo">
        <nav class="navbar">
            <a href="index.html">Inicio</a>
            <a href="SoySocio.html">Mi Panel</a>
        </nav>
    </header>

    <main class="main-wrapper">
        <div id="panel-compra" class="card">
            <h2>Entradas</h2>
            <div class="qty-box">
                <button type="button" class="btn-qty" onclick="cambiarCantidad(-1)">-</button>
                <span id="cant-display" style="font-size: 1.8rem; font-weight: 800;">1</span>
                <button type="button" class="btn-qty" onclick="cambiarCantidad(1)">+</button>
            </div>
            <p style="text-align: center; color: #aaa;">Total: <strong style="color: white; font-size: 1.3rem;">$<span id="total-display">1500</span></strong></p>
            
            <button type="button" class="btn-action btn-pay" onclick="guardarDatosYContinuar()">Pagar Ahora</button>
            
            <a href="SoySocio.html" style="text-decoration:none;"><button type="button" class="btn-action btn-regresar">Volver al Panel</button></a>
        </div>

        <div id="panel-ticket" class="card" style="display:none;">
            <h2 style="color: var(--gold);">¡Pago Exitoso!</h2>
            <div id="ticket-img">
                <h3>C.S.D. CONSTITUCIÓN</h3>
                <p><strong>Cantidad:</strong> <span id="t-cant">---</span></p>
                <div style="font-size: 40px; margin-top: 15px;"><i class="fas fa-qrcode"></i></div>
            </div>
            <button type="button" class="btn-action btn-pay" onclick="descargarTicket()">Descargar Entrada</button>
            <a href="SoySocio.html" style="text-decoration:none;"><button type="button" class="btn-action btn-regresar">Volver al Panel</button></a>
        </div>
    </main>

    <script>
        let cantidadActual = 1;
        const PRECIO = 1500;
        
        function cambiarCantidad(n) {
            cantidadActual = Math.max(1, Math.min(5, cantidadActual + n));
            document.getElementById('cant-display').innerText = cantidadActual;
            document.getElementById('total-display').innerText = cantidadActual * PRECIO;
        }

        function guardarDatosYContinuar() {
            sessionStorage.setItem('cantidadComprada', cantidadActual);
            sessionStorage.setItem('totalCompra', cantidadActual * PRECIO);
            
            // Navegación directa a la pasarela
            window.location.href = "p_pago.html";
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            // Detecta si viene de la pasarela tras un pago exitoso
            if(urlParams.get('status') === 'approved') {
                document.getElementById('panel-compra').style.display = 'none';
                document.getElementById('panel-ticket').style.display = 'block';
                document.getElementById('t-cant').innerText = sessionStorage.getItem('cantidadComprada') || "1";
            }
        };

        function descargarTicket() {
            html2canvas(document.getElementById('ticket-img')).then(canvas => {
                const a = document.createElement('a');
                a.download = `Entrada_Constitucion.png`;
                a.href = canvas.toDataURL();
                a.click();
            });
        }
    </script>
</body>
</html>
