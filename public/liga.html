<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRÓXIMO PARTIDO | Club Constitución</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --oro: #fbc02d;
            --negro: #0d1117;
            --negro-luz: #161b22;
            --borde: #30363d;
            --blanco: #ffffff;
            --gris-texto: #8b949e;
            --gris-claro: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background-color: var(--negro);
            color: var(--blanco);
        }

        /* --- NAVBAR AMARILLA --- */
        .navbar-club {
            background-color: var(--oro);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #000;
            font-weight: 800;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-link:hover { opacity: 0.6; }

        /* --- HEADER LIMPIO --- */
        .header-simple {
            padding: 40px 20px;
            text-align: center;
            background-color: var(--negro-luz);
            border-bottom: 4px solid var(--oro);
        }

        .logo-small {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--oro);
            background: white;
            margin-bottom: 15px;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* --- TARJETA DE PARTIDO CON SECCIÓN BLANCA --- */
        .match-card {
            background: var(--negro-luz);
            border-radius: 20px;
            border: 1px solid var(--borde);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .match-header {
            background: var(--oro);
            padding: 12px;
            text-align: center;
            color: #000;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* SECCIÓN DE ESCUDOS CON FONDO BLANCO */
        .match-body-white {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 50px 20px;
            background-color: var(--blanco); /* Fondo Blanco pedido */
            color: #000; /* Texto negro para contrastar con el fondo blanco */
        }

        .team-box {
            text-align: center;
            flex: 1;
        }

        .team-box img {
            width: 130px;
            height: 130px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .team-name {
            font-size: 1.5rem;
            font-weight: 900;
            margin: 0;
            color: #000;
            text-transform: uppercase;
        }

        .vs-circle {
            width: 60px;
            height: 60px;
            background: var(--oro);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 900;
            font-size: 1.2rem;
            margin: 0 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 2;
        }

        /* PIE DE TARJETA (DATOS) */
        .match-footer {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: var(--negro-luz);
            padding: 25px;
            border-top: 1px solid var(--borde);
        }

        .info-item {
            text-align: center;
            border-right: 1px solid var(--borde);
        }

        .info-item:last-child { border-right: none; }

        .info-label {
            display: block;
            color: var(--gris-texto);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .info-value {
            color: var(--oro);
            font-weight: bold;
            font-size: 1.2rem;
        }

        @media (max-width: 600px) {
            .match-body-white { flex-direction: column; gap: 30px; }
            .vs-circle { transform: rotate(90deg); margin: 10px 0; }
            .match-footer { grid-template-columns: 1fr; gap: 20px; }
            .info-item { border-right: none; border-bottom: 1px solid var(--borde); padding-bottom: 15px; }
        }
    </style>
</head>
<body>

    <nav class="navbar-club">
        <div class="nav-container">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> INICIO</a>
            <a href="el_club.html" class="nav-link"><i class="fas fa-shield-alt"></i> EL CLUB</a>
            <a href="socios.html" class="nav-link"><i class="fas fa-users"></i> SOCIOS</a>
            <a href="contiback/admin_login.html" class="nav-link"><i class="fas fa-user-cog"></i> ADMIN</a>
        </div>
    </nav>

    <header class="header-simple">
        <img src="logo.jpg" alt="Logo" class="logo-small">
        <h1 style="margin:0; font-size: 1.8rem; letter-spacing: 1px;">PRÓXIMO PARTIDO</h1>
        <p style="color: var(--oro); margin: 5px 0 0; font-weight: bold; text-transform: uppercase;">Club Social y Deportivo Constitución</p>
    </header>

    <div class="container">
        <div class="match-card">
            <div class="match-header">Liga Sanrafaelina de Fútbol</div>
            
            <div class="match-body-white">
                <div class="team-box">
                    <img id="logoLocal" src="logo.jpg" alt="Local">
                    <p class="team-name">CONSTITUCIÓN</p>
                </div>

                <div class="vs-circle">VS</div>

                <div class="team-box">
                    <img id="logoRival" src="perfil.png" alt="Rival">
                    <p id="nombreRival" class="team-name">CARGANDO...</p>
                </div>
            </div>

            <div class="match-footer">
                <div class="info-item">
                    <span class="info-label"><i class="far fa-calendar-alt"></i> Fecha</span>
                    <span id="fecha" class="info-value">--/--</span>
                </div>
                <div class="info-item">
                    <span class="info-label"><i class="far fa-clock"></i> Horario</span>
                    <span id="hora" class="info-value">--:--</span>
                </div>
                <div class="info-item">
                    <span class="info-label"><i class="fas fa-map-marker-alt"></i> Estadio</span>
                    <span id="lugar" class="info-value">---</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgg57r83Wxt5COBhKWVfIA1JzlhGmiVaE",
            authDomain: "csydconstitucion-8b8bb.firebaseapp.com",
            projectId: "csydconstitucion-8b8bb",
            storageBucket: "csydconstitucion-8b8bb.firebasestorage.app",
            messagingSenderId: "363486272350",
            appId: "1:363486272350:web:e937e924c4371a3db74dcf"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("config").doc("partido").onSnapshot((doc) => {
            if (doc.exists) {
                const p = doc.data();
                document.getElementById('nombreRival').textContent = p.rival || "RIVAL";
                document.getElementById('fecha').textContent = p.fecha || "--/--";
                document.getElementById('hora').textContent = (p.hora || "--:--") + " HS";
                document.getElementById('lugar').textContent = p.lugar || "A CONFIRMAR";
                
                if(p.logoLocal) document.getElementById('logoLocal').src = p.logoLocal;
                if(p.logoRival) document.getElementById('logoRival').src = p.logoRival;
            }
        });
    </script>
</body>
</html>
